{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - Trimant</title>

    <!-- CSS PRINCIPAL -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- FONDOS ANIMADOS -->
    <div class="circuit-pattern"></div>
    <div class="glow-lines"></div>

    <!-- HUD -->
    <div class="hud-overlay">
        <div class="hud-ring"></div>
        <div class="hud-cross"></div>
    </div>

    <!-- LOGO -->
    <img src="{% static 'images/Fondo.png' %}" alt="Logo Trimant" class="logo">

    <!-- BUSCADOR -->
    <div class="search-box">
        <div class="search-input-wrapper">
            <img src="{% static 'images/lupa.png' %}" alt="Buscar">
            <input type="text" id="buscar" placeholder="Buscar...">
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="container">
        <h2>CASA CENTRAL</h2>

        <!-- GALERÍA -->
        <div class="galeria-scroll">
            <div class="galeria">
                {% for fila in datos %}
                    {% if fila.TIENE_IMAGEN %}
                        <div class="herramienta-contenedor">
                            <img
                                src="{% static 'herramientas/' %}{{ fila.SKU }}.png"
                                class="herramienta-img"
                                data-sku="{{ fila.SKU }}"
                                alt="{{ fila.SKU }}"
                            >
                            <div class="nombre-sku">{{ fila.SKU }}</div>
                        </div>
                    {% endif %}
                {% endfor %}
            </div>
        </div>

        <!-- TABLA -->
        <table id="tabla-inventario">
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>HERRAMIENTAS</th>
                    <th>CANTIDADES</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                {% for fila in datos %}
                    <tr data-sku="{{ fila.SKU }}">
                        <td>{{ fila.SKU }}</td>
                        <td>{{ fila.HERRAMIENTAS }}</td>
                        <td>{{ fila.CANTIDADES }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <!-- PAGINACIÓN -->
        <div class="pagination" id="paginacion"></div>
    </div>

    <!-- 🤖 BOT (VISIBLE Y AISLADO) -->
    <div id="robot" class="robot-sprite"></div>

    <!-- JS DEL BOT -->
    <script src="{% static 'js/botScene.js' %}"></script>

    <!-- JS TABLA -->
    <script>
        const filas = Array.from(document.querySelectorAll("#tabla-body tr"));
        let filasPorPagina = 10;
        let paginaActual = 1;

        function mostrarPagina(pagina) {
            const inicio = (pagina - 1) * filasPorPagina;
            const fin = inicio + filasPorPagina;

            filas.forEach((fila, index) => {
                fila.style.display = (index >= inicio && index < fin) ? "" : "none";
                fila.classList.remove("resaltado");
            });

            paginaActual = pagina;
            crearPaginacion();
        }

        function crearPaginacion() {
            const totalPaginas = Math.ceil(filas.length / filasPorPagina);
            const paginacion = document.getElementById("paginacion");
            paginacion.innerHTML = "";

            const maxBotones = 7;
            let inicio = Math.max(1, paginaActual - Math.floor(maxBotones / 2));
            let fin = Math.min(totalPaginas, inicio + maxBotones - 1);

            if (inicio > 1) {
                paginacion.appendChild(crearBoton("«", 1));
            }

            for (let i = inicio; i <= fin; i++) {
                const btn = crearBoton(i, i);
                if (i === paginaActual) btn.classList.add("active");
                paginacion.appendChild(btn);
            }

            if (fin < totalPaginas) {
                paginacion.appendChild(crearBoton("»", totalPaginas));
            }
        }

        function crearBoton(texto, pagina) {
            const btn = document.createElement("button");
            btn.textContent = texto;
            btn.addEventListener("click", () => mostrarPagina(pagina));
            return btn;
        }

        document.getElementById("buscar").addEventListener("keyup", function () {
            const valor = this.value.toLowerCase();
            filas.forEach(fila => {
                fila.style.display = fila.textContent.toLowerCase().includes(valor) ? "" : "none";
            });
            if (valor === "") mostrarPagina(1);
        });

        document.querySelectorAll(".herramienta-img").forEach(img => {
            img.addEventListener("click", () => {
                const sku = img.dataset.sku.toLowerCase();
                filas.forEach(fila => {
                    fila.style.display = fila.dataset.sku.toLowerCase() === sku ? "" : "none";
                });
                document.getElementById("paginacion").innerHTML = "";
            });
        });

        mostrarPagina(1);
    </script>

</body>
</html>
